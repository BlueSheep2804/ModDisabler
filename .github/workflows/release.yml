name: Release

on:
  workflow_dispatch:
    inputs:
      snapshot_version:
        description: 'Is snapshot version?'
        type: boolean
      version_override:
        description: 'Version override'
        type: string
      release_type_override:
        description: 'ReleaseType override'
        type: choice
        options:
          - STABLE
          - BETA
          - ALPHA

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build and publish
        run: ./gradlew -Pis_snapshot=$SNAPSHOT -Pversion_override=$VERSION_OVERRIDE -Prelease_type_override=$RELEASE_TYPE_OVERRIDE build publishMods
        env:
          SNAPSHOT: ${{ inputs.snapshot_version }}
          VERSION_OVERRIDE: ${{ inputs.version_override }}
          RELEASE_TYPE_OVERRIDE: ${{ inputs.release_type_override }}
          CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
